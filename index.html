                            <option value="要介護2">要介護2</option>

                            <option value="要介護4">要介護4</option>
                            <option value="要介護5">要介護5</option>
                          </select>
                        </div>
                      </div>
                      <div className="form-group">
                        <label className="form-label">KP</label>
                        <input
                          type="text"
                          name="kp"
                          value={formData.kp}
                          onChange={handleInputChange}
                          className="form-input"
                        />
                      </div>
                      <div className="form-group">
                        <label className="form-label">KP連絡先</label>
                        <input
                          type="tel"
                          name="kpContact"
                          value={formData.kpContact}
                          onChange={handleInputChange}
                          className="form-input"
                        />
                      </div>
                      <div className="form-group">
                        <label className="form-label">在宅ケアマネ</label>
                        <input
                          type="text"
                          name="careManager"
                          value={formData.careManager}
                          onChange={handleInputChange}
                          className="form-input"
                        />
                      </div>
                      <div className="form-group">
                        <label className="form-label">CM連絡先</label>
                        <input
                          type="tel"
                          name="cmContact"
                          value={formData.cmContact}
                          onChange={handleInputChange}
                          className="form-input"
                        />
                      </div>
                      <div className="form-group">
                        <label className="form-label">担当者</label>
                        <input
                          type="text"
                          name="assignee"
                          value={formData.assignee}
                          onChange={handleInputChange}
                          className="form-input"
                        />
                      </div>
                      <div className="modal-buttons">
                        <button type="button" className="btn-secondary" onClick={() => setShowModal(false)}>
                          キャンセル
                        </button>
                        <button type="submit" className="btn-primary">
                          保存
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // React 17の古いAPIを使用
        ReactDOM.render(<CareFacilityApp />, document.getElementById('root'));
        console.log('App rendered successfully!');
    </script>
</body>
</html>
