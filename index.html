        .grid-4 {

        .modal-content {

        }
        .modal-title {

        }
        .close-button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #8b7859;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .close-button:hover {
            background: #f0ede4;
            color: #4a3f2a;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #4a3f2a;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0ddd4;
            border-radius: 8px;
            font-size: 14px;
            background: #fdfcf8;
            color: #4a3f2a;
            transition: all 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #8b7859;
            box-shadow: 0 0 0 2px rgba(139, 120, 93, 0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            border-top: 1px solid #ede7d6;
            padding-top: 16px;
        }
        .btn-secondary {
            background: #f7f4ed;
            color: #4a3f2a;
            border: 1px solid #e0ddd4;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: #f0ede4;
            border-color: #8b7859;
        }
        .main-title {
            font-size: 32px;
            font-weight: 700;
            color: #4a3f2a;
            background: linear-gradient(135deg, #8b7859 0%, #6b5d47 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 12px;
            position: relative;
        }
        .main-title::before {
            content: "🏠";
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #4a3f2a;
            background: #f7f4ed;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #e0ddd4;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: "📋";
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const CareFacilityApp = () => {
          const [currentView, setCurrentView] = React.useState('list');
          const [selectedApplicant, setSelectedApplicant] = React.useState(null);
          const [showModal, setShowModal] = React.useState(false);
          const [sortConfig, setSortConfig] = React.useState({ key: null, direction: 'asc' });
          const [applicants, setApplicants] = React.useState([
            {
              id: 1,

              cmContact: '048-123-4567',
              timeline: [
                {
                  id: 2,

                  timestamp: '12月18日',
                  content: '実調完了\nADL良好、認知症なし。家族の協力体制◎\n特記事項：夜間のトイレ介助が必要',
                  action: '実調完了',
                  replies: []
                },
                {
                  id: 1,
                  author: '佐藤花子',
                  timestamp: '12月15日',
                  content: '申込書受領・台帳入力完了\n紹介元：○○居宅 山田ケアマネ',
                  action: '申込書受領',
                  replies: []
                }
              ]
            },
            {
              id: 2,
              applicationDate: '2024-12-20',
              name: '山田花子',
              age: 78,
              careLevel: '要介護4',
              status: '申込書受領',
              assignee: '鈴木一郎',
              kp: '山田太郎（長男）',
              kpContact: '080-9876-5432',
              careManager: '佐藤ケアマネ',
              cmContact: '048-987-6543',
              timeline: [
                {
                  id: 1,
                  author: '鈴木一郎',
                  timestamp: '12月20日',
                  content: '申込書受領・台帳入力完了\n紹介元：△△病院 SW田中',
                  action: '申込書受領',
                  replies: []
                }
              ]
            },
            {
              id: 3,
              applicationDate: '2024-12-10',
              name: '佐藤三郎',
              age: 92,
              careLevel: '要介護5',
              status: '健康診断書待ち',
              assignee: '高橋美代子',
              kp: '佐藤京子（長女）',
              kpContact: '070-1111-2222',
              careManager: '田中ケアマネ',
              cmContact: '048-111-2222',
              timeline: [
                {
                  id: 3,
                  author: '高橋美代子',
                  timestamp: '12月14日',
                  content: '健康診断書を家族に依頼\n主治医：○○病院 山田先生',
                  action: '健康診断書依頼',
                  replies: []
                },
                {
                  id: 2,
                  author: '高橋美代子',
                  timestamp: '12月12日',
                  content: '実調完了\n重度の認知症あり。医療的ケア多数\n要検討事項：夜間の見守り体制',
                  action: '実調完了',
                  replies: []
                },
                {
                  id: 1,
                  author: '高橋美代子',
                  timestamp: '12月10日',
                  content: '申込書受領・台帳入力完了\n紹介元：○○病院 SW佐藤',
                  action: '申込書受領',
                  replies: []
                }
              ]
            }
          ]);

          const [newPost, setNewPost] = React.useState('');
          const [showPostForm, setShowPostForm] = React.useState(false);
          const [postType, setPostType] = React.useState('');
          const [replyTo, setReplyTo] = React.useState(null);
          const [likes, setLikes] = React.useState({});
          const [showActions, setShowActions] = React.useState(false);
          const [formData, setFormData] = React.useState({
            name: '',
            age: '',
            careLevel: '',
            kp: '',
            kpContact: '',
            careManager: '',
            cmContact: '',
            assignee: ''
          });

          const getStatusColor = (status, applicationDate) => {
            const today = new Date();
            const appDate = new Date(applicationDate);
            const daysPassed = Math.floor((today - appDate) / (1000 * 60 * 60 * 24));
            
            if (daysPassed > 10) return 'status-red';
            if (daysPassed > 5) return 'status-yellow';
            return 'status-green';
          };

          const formatTimeAgo = (timestamp) => {
            const today = new Date();
            const date = new Date(timestamp);
            const diffTime = Math.abs(today - date);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return '今日';
            if (diffDays === 1) return '1日前';
            if (diffDays < 7) return `${diffDays}日前`;
            return timestamp;
          };

          const handleSort = (key) => {
            let direction = 'asc';
            if (sortConfig.key === key && sortConfig.direction === 'asc') {
              direction = 'desc';
            }
            setSortConfig({ key, direction });
          };

          const getSortIcon = (key) => {
            if (sortConfig.key !== key) return '↕';
            return sortConfig.direction === 'asc' ? '↑' : '↓';
          };

          const sortedApplicants = React.useMemo(() => {
            let sortableApplicants = [...applicants];
            if (sortConfig.key) {
              sortableApplicants.sort((a, b) => {
                let aValue = a[sortConfig.key];
                let bValue = b[sortConfig.key];
                
                if (sortConfig.key === 'applicationDate') {
                  aValue = new Date(aValue);
                  bValue = new Date(bValue);
                } else if (sortConfig.key === 'age') {
                  aValue = parseInt(aValue);
                  bValue = parseInt(bValue);
                }
                
                if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
                if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
              });
            }
            return sortableApplicants;
          }, [applicants, sortConfig]);

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({
              ...prev,
              [name]: value
            }));
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!formData.name || !formData.age || !formData.careLevel) {
              alert('必須項目を入力してください。');
              return;
            }
            
            const newApplicant = {
              id: applicants.length + 1,
              applicationDate: new Date().toISOString().split('T')[0],
              name: formData.name,
              age: parseInt(formData.age),
              careLevel: formData.careLevel,
              status: '申込書受領',
              assignee: formData.assignee || '担当者未定',
              kp: formData.kp,
              kpContact: formData.kpContact,
              careManager: formData.careManager,
              cmContact: formData.cmContact,
              timeline: [{
                id: 1,
                author: formData.assignee || '担当者未定',
                timestamp: '今',
                content: '申込書受領・台帳入力完了',
                action: '申込書受領',
                replies: []
              }]
            };
            
            setApplicants(prev => [...prev, newApplicant]);
            setFormData({
              name: '',
              age: '',
              careLevel: '',
              kp: '',
              kpContact: '',
              careManager: '',
              cmContact: '',
              assignee: ''
            });
            setShowModal(false);
          };

          const handleStatusUpdate = (type) => {
            setPostType(type);
            setShowPostForm(true);
            setReplyTo(null);
          };

          const handleReply = (postId) => {
            setReplyTo(postId);
            setShowPostForm(true);
            setPostType('');
          };

          const handleFreePost = () => {
            setPostType('');
            setShowPostForm(true);
            setReplyTo(null);
          };

          const handleLike = (applicantId, postId) => {
            const key = `${applicantId}-${postId}`;
            setLikes(prev => ({
              ...prev,
              [key]: !prev[key]
            }));
          };

          const submitPost = () => {
            if (!newPost.trim()) return;
            
            const updatedApplicants = applicants.map(app => {
              if (app.id === selectedApplicant.id) {
                if (replyTo) {
                  const updatedTimeline = app.timeline.map(post => {
                    if (post.id === replyTo) {
                      return {
                        ...post,
                        replies: [...(post.replies || []), {
                          id: Date.now(),
                          author: app.assignee,
                          timestamp: '今',
                          content: newPost
                        }]
                      };
                    }
                    return post;
                  });
                  return { ...app, timeline: updatedTimeline };
                } else {
                  const newTimelineItem = {
                    id: app.timeline.length + 1,
                    author: app.assignee,
                    timestamp: '今',
                    content: newPost,
                    action: postType || null,
                    replies: []
                  };
                  
                  let newStatus = app.status;
                  if (postType === '実調完了') newStatus = '健康診断書待ち';
                  if (postType === '健康診断書受領') newStatus = '判定会議中';
                  if (postType === '判定会議中') newStatus = '入居決定';
                  if (postType === '入居決定') newStatus = '入居日調整中';
                  if (postType === '書類送付済') newStatus = '入居準備中';
                  if (postType === '入居完了') newStatus = '入居完了';
                  
                  return {
                    ...app,
                    status: newStatus,
                    timeline: [newTimelineItem, ...app.timeline]
                  };
                }
              }
              return app;
            });
            
            setApplicants(updatedApplicants);
            
            const updatedSelected = updatedApplicants.find(app => app.id === selectedApplicant.id);
            setSelectedApplicant(updatedSelected);
            
            setNewPost('');
            setShowPostForm(false);
            setPostType('');
            setReplyTo(null);
          };

          if (currentView === 'detail' && selectedApplicant) {
            const allActions = [
              '申込書受領', '実調日程調整中', '実調完了', '健康診断書依頼',
              '健康診断書受領', '判定会議中', '入居決定', '入居日調整中',
              '書類送付済', '入居準備完了', '入居完了'
            ];

            const completedActions = selectedApplicant.timeline
              .filter(item => item.action)
              .map(item => item.action);

            return (
              <div className="container">
                <div className="card">
                  <div className="card-content">
                    <a href="#" onClick={() => setCurrentView('list')} className="back-btn">
                      ← 一覧に戻る
                    </a>
                    
                    <h1 style={{fontSize: '24px', fontWeight: 'bold', marginBottom: '8px'}}>
                      {selectedApplicant.name}さん ({selectedApplicant.age}歳・{selectedApplicant.careLevel})
                    </h1>
                    <div className={`status-badge ${getStatusColor(selectedApplicant.status, selectedApplicant.applicationDate)}`}>
                      {selectedApplicant.status}
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '24px', marginTop: '24px'}}>
                      <div>
                        <h3 style={{fontWeight: '600', marginBottom: '8px'}}>基本情報</h3>
                        <div>申込日: {selectedApplicant.applicationDate}</div>
                        <div>担当者: {selectedApplicant.assignee}</div>
                      </div>
                      <div>
                        <h3 style={{fontWeight: '600', marginBottom: '8px'}}>連絡先</h3>
                        <div>KP: {selectedApplicant.kp}</div>
                        <div>KP連絡先: {selectedApplicant.kpContact}</div>
                        <div>在宅ケアマネ: {selectedApplicant.careManager}</div>
                        <div>CM連絡先: {selectedApplicant.cmContact}</div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="grid-4">
                  <div className="card flex-col">
                    <div className="sticky-header">
                      <div className="flex-between">
                        <h2 style={{fontSize: '18px', fontWeight: '600'}}>タイムライン</h2>
                        <button onClick={handleFreePost} className="btn-green">
                          投稿
                        </button>
                      </div>
                    </div>

                    <div className="scroll-area">
                      {showPostForm && (
                        <div className="form-area">
                          <div className="form-box">
                            {postType && <div style={{fontWeight: '600', marginBottom: '8px', color: '#1e40af'}}>{postType}</div>}
                            {replyTo && <div style={{fontSize: '14px', color: '#6b7280', marginBottom: '8px'}}>
                              返信先: {selectedApplicant.timeline.find(t => t.id === replyTo)?.author}
                            </div>}
                            {!postType && !replyTo && <div style={{fontWeight: '600', marginBottom: '8px', color: '#059669'}}>メモを追加</div>}
                            <textarea
                              value={newPost}
                              onChange={(e) => setNewPost(e.target.value)}
                              className="textarea"
                              rows="3"
                              placeholder="メモを入力してください..."
                            />
                            <div style={{display: 'flex', justifyContent: 'flex-end', gap: '8px', marginTop: '12px'}}>
                              <button
                                onClick={() => {
                                  setShowPostForm(false);
                                  setPostType('');
                                  setReplyTo(null);
                                }}
                                className="btn"
                                style={{background: '#f3f4f6', color: '#374151'}}
                              >
                                キャンセル
                              </button>
                              <button onClick={submitPost} className="btn-primary">
                                投稿
                              </button>
                            </div>
                          </div>
                        </div>
                      )}

                      {selectedApplicant.timeline.map((item) => (
                        <div key={item.id} className="timeline-item">
                          <div className="timeline-content">
                            <div style={{display: 'flex', alignItems: 'center', marginBottom: '8px'}}>
                              <span style={{fontWeight: '600'}}>{item.author}</span>
                              <span style={{color: '#6b7280', fontSize: '14px', marginLeft: '8px'}}>
                                · {formatTimeAgo(item.timestamp)}
                              </span>
                              {item.action && (
                                <span className={`action-badge ${item.action === '入居完了' ? 'action-red' : 'action-blue'}`}>
                                  {item.action}
                                </span>
                              )}
                            </div>
                            <div style={{whiteSpace: 'pre-line', marginBottom: '12px'}}>{item.content}</div>
                            
                            <div style={{display: 'flex', gap: '16px'}}>
                              <button
                                onClick={() => handleLike(selectedApplicant.id, item.id)}
                                className={`like-btn ${likes[`${selectedApplicant.id}-${item.id}`] ? 'liked' : ''}`}
                              >
                                ♡ {likes[`${selectedApplicant.id}-${item.id}`] ? '1' : '0'}
                              </button>
                              <button onClick={() => handleReply(item.id)} className="reply-btn">
                                💬 返信
                              </button>
                            </div>

                            {item.replies && item.replies.length > 0 && (
                              <div className="reply-area">
                                {item.replies.map((reply) => (
                                  <div key={reply.id} className="reply-item">
                                    <div style={{fontSize: '14px'}}>
                                      <span style={{fontWeight: '600'}}>{reply.author}</span>
                                      <span style={{color: '#6b7280', marginLeft: '8px'}}>
                                        · {formatTimeAgo(reply.timestamp)}
                                      </span>
                                    </div>
                                    <div style={{fontSize: '14px', whiteSpace: 'pre-line'}}>{reply.content}</div>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="card flex-col">
                    <div className="sticky-header">
                      <div className="flex-between">
                        <h2 style={{fontSize: '18px', fontWeight: '600'}}>アクション</h2>
                        <button
                          onClick={() => setShowActions(!showActions)}
                          className="btn-primary"
                        >
                          {showActions ? '閉じる' : '表示'}
                        </button>
                      </div>
                    </div>
                    
                    {showActions ? (
                      <div className="scroll-area">
                        <div className="action-list">
                          {allActions.map((action, index) => {
                            const isCompleted = completedActions.includes(action);
                            return (
                              <button
                                key={index}
                                onClick={() => handleStatusUpdate(action)}
                                disabled={isCompleted}
                                className="action-btn"
                                style={{
                                  backgroundColor: isCompleted ? '#e5e7eb' : '#3b82f6',
                                  color: isCompleted ? '#9ca3af' : 'white'
                                }}
                              >
                                {isCompleted ? '✓ ' : ''}{action}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    ) : (
                      <div className="text-center">
                        <div style={{fontSize: '18px', marginBottom: '8px'}}>📋</div>
                        <div style={{fontSize: '14px'}}>「表示」ボタンでアクション一覧を確認できます</div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="container">
              <div className="card">
                <div className="card-content">
                  <h1 className="main-title">特養入居進捗管理</h1>
                  <p style={{color: '#8b7859', marginTop: '8px', textAlign: 'center'}}>入居希望者の進捗状況を管理します</p>
                </div>
              </div>

              <div className="card">
                <div className="card-header">
                  <div className="flex-between">
                    <h2 className="section-title">申込者一覧</h2>
                    <div style={{display: 'flex', alignItems: 'center', gap: '16px'}}>
                      <span style={{fontSize: '14px', color: '#8b7859'}}>{applicants.length}件</span>
                      <button className="btn-primary" onClick={() => setShowModal(true)}>新規登録</button>
                    </div>
                  </div>
                </div>
                <div className="card-content">
                  <table className="table">
                    <thead>
                      <tr>
                        <th onClick={() => handleSort('applicationDate')}>
                          申込日
                          <span className="sort-icon">{getSortIcon('applicationDate')}</span>
                        </th>
                        <th onClick={() => handleSort('name')}>
                          名前
                          <span className="sort-icon">{getSortIcon('name')}</span>
                        </th>
                        <th onClick={() => handleSort('age')}>
                          年齢
                          <span className="sort-icon">{getSortIcon('age')}</span>
                        </th>
                        <th onClick={() => handleSort('careLevel')}>
                          要介護度
                          <span className="sort-icon">{getSortIcon('careLevel')}</span>
                        </th>
                        <th onClick={() => handleSort('status')}>
                          ステータス
                          <span className="sort-icon">{getSortIcon('status')}</span>
                        </th>
                        <th onClick={() => handleSort('careManager')}>
                          担当CM
                          <span className="sort-icon">{getSortIcon('careManager')}</span>
                        </th>
                      </tr>
                    </thead>
                    <tbody>
                      {sortedApplicants.map((applicant) => (
                        <tr 
                          key={applicant.id}
                          onClick={() => {
                            setSelectedApplicant(applicant);
                            setCurrentView('detail');
                          }}
                        >
                          <td>{applicant.applicationDate}</td>
                          <td style={{fontWeight: '600'}}>{applicant.name}</td>
                          <td>{applicant.age}歳</td>
                          <td>{applicant.careLevel}</td>
                          <td>
                            <span className={`status-badge ${getStatusColor(applicant.status, applicant.applicationDate)}`}>
                              {applicant.status}
                            </span>
                          </td>
                          <td style={{fontWeight: '500', color: '#4a3f2a'}}>{applicant.careManager}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
              
              {showModal && (
                <div className="modal-overlay" onClick={() => setShowModal(false)}>
                  <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                    <div className="modal-header">
                      <h3 className="modal-title">新規申込者登録</h3>
                      <button className="close-button" onClick={() => setShowModal(false)}>×</button>
                    </div>
                    <form onSubmit={handleSubmit}>
                      <div className="form-group">
                        <label className="form-label">名前 *</label>
                        <input
                          type="text"
                          name="name"
                          value={formData.name}
                          onChange={handleInputChange}
                          className="form-input"
                          required
                        />
                      </div>
                      <div className="form-row">
                        <div className="form-group">
                          <label className="form-label">年齢 *</label>
                          <input
                            type="number"
                            name="age"
                            value={formData.age}
                            onChange={handleInputChange}
                            className="form-input"
                            min="0"
                            max="120"
                            required
                          />
                        </div>
                        <div className="form-group">
                          <label className="form-label">要介護度 *</label>
                          <select
                            name="careLevel"
                            value={formData.careLevel}
                            onChange={handleInputChange}
                            className="form-input"
                            required
                          >
                            <option value="">選択してください</option>
                            <option value="要支援1">要支援1</option>
                            <option value="要支援2">要支援2</option>
                            <option value="要介護1">要介護1</option>
                            <option value="要介護2">要介護2</option>
                            <option value="要介護3">要介護3</option>
                            <option value="要介護4">要介護4</option>
                            <option value="要介護5">要介護5</option>
                          </select>
                        </div>
                      </div>
                      <div className="form-group">
                        <label className="form-label">KP（キーパーソン）</label>
                        <input
                          type="text"
                          name="kp"
                          value={formData.kp}
                          onChange={handleInputChange}
                          className="form-input"
                        />
                      </div>
                      <div className="form-group">
                        <label className="form-label">KP連絡先</label>
                        <input
                          type="tel"
                          name="kpContact"
                          value={formData.kpContact}
                          onChange={handleInputChange}
                          className="form-input"
                        />
                      </div>
                      <div className="form-group">
                        <label className="form-label">在宅ケアマネ</label>
                        <input
                          type="text"
                          name="careManager"
                          value={formData.careManager}
                          onChange={handleInputChange}
                          className="form-input"
                        />
                      </div>
                      <div className="form-group">
                        <label className="form-label">CM連絡先</label>
                        <input
                          type="tel"
                          name="cmContact"
                          value={formData.cmContact}
                          onChange={handleInputChange}
                          className="form-input"
                        />
                      </div>
                      <div className="form-group">
                        <label className="form-label">担当者</label>
                        <input
                          type="text"
                          name="assignee"
                          value={formData.assignee}
                          onChange={handleInputChange}
                          className="form-input"
                        />
                      </div>
                      <div className="modal-buttons">
                        <button type="button" className="btn-secondary" onClick={() => setShowModal(false)}>
                          キャンセル
                        </button>
                        <button type="submit" className="btn-primary">
                          保存
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // React 17の古いAPIを使用
        ReactDOM.render(<CareFacilityApp />, document.getElementById('root'));
        console.log('App rendered successfully!');
    </script>
</body>
</html>
