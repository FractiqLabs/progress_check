
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入退去手続きチェックリスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 900px; }
        .card-header { background-color: #007bff; color: white; }
        .progress-bar { background-color: #28a745; }
        .user-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .user-link:hover .card {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .card {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4 text-center">入退去手続きチェックリスト</h1>

        <!-- New User Form -->
        <div class="card mb-4">
            <div class="card-header">
                新規利用者を追加
            </div>
            <div class="card-body">
                <form action="{{ url_for('add_user') }}" method="post">
                    <div class="input-group">
                        <input type="text" class="form-control" name="name" placeholder="利用者様の氏名" required>
                        <button class="btn btn-primary" type="submit">追加</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- User List -->
        <h2 class="mb-3">利用者一覧</h2>
        {% if users %}
            {% for user in users %}
            <a href="{{ url_for('user_details', user_id=user.id) }}" class="user-link">
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="card-title mb-0">{{ user.name }}</h5>
                            <span class="badge bg-secondary">{{ user.status }}</span>
                        </div>
                        <p class="card-text text-muted small mt-2">進捗: {{ user.progress }}</p>
                        <div class="progress">
                            <div class="progress-bar" role="progressbar" style="width: {{ user.progress_percent }}%;" aria-valuenow="{{ user.progress_percent }}" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                </div>
            </a>
            {% endfor %}
        {% else %}
            <p class="text-center text-muted">現在、利用者はいません。</p>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
